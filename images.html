<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Gallery - Dayton Vinson</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
      body { font-family: 'Inter', sans-serif; }
    </style>
  </head>
  <body class="bg-blue-50 text-gray-800 p-4 font-sans">
    <div id="all-contents" class="max-w-4xl mx-auto">
      <nav class="bg-blue-500 p-4 rounded-lg mb-4 shadow-md">
        <div class="flex justify-between items-center">
          <h1 class="text-white text-2xl font-bold">
            Dayton's Amazing Website
          </h1>
          <ul class="flex space-x-4">
            <li>
              <a
                href="index.html"
                class="text-white hover:text-blue-200 px-3 py-2 rounded"
                >Home</a
              >
            </li>
            <li>
              <a
                href="portfolio.html"
                class="text-white hover:text-blue-200 px-3 py-2 rounded"
                >Portfolio</a
              >
            </li>
            <li>
              <a
                href="images.html"
                class="text-white hover:text-blue-200 px-3 py-2 rounded bg-blue-600"
                >Image Gallery</a
              >
            </li>
          </ul>
        </div>
      </nav>

      <main class="bg-white rounded-lg shadow-lg p-6">
        <h1 class="text-3xl font-bold text-gray-900 mb-6 text-center">
          My Image Gallery
        </h1>
        <div class="slideshow-container relative max-w-2xl mx-auto">
          <div class="slide">
            <img
              src="assets/IMG_9075.JPG"
              alt="Beauty"
              class="w-full rounded-lg shadow-md cursor-pointer"
            />
            <div
              class="caption absolute bottom-0 left-0 right-0 bg-gradient-to-r from-blue-500 to-purple-600 text-white p-3 rounded-b-lg font-semibold text-lg"
            >
              Beauty in Nature
            </div>
          </div>
          <div class="slide hidden">
            <img
              src="assets/line.JPG"
              alt="Shape"
              class="w-full rounded-lg shadow-md"
            />
            <div
              class="caption absolute bottom-0 left-0 right-0 bg-gradient-to-r from-blue-500 to-purple-600 text-white p-3 rounded-b-lg font-semibold text-lg"
            >
              Shapes
            </div>
          </div>
          <div class="slide hidden">
            <img
              src="assets/ants pov.JPG"
              alt="Ants POV"
              class="w-full rounded-lg shadow-md"
            />
            <div
              class="caption absolute bottom-0 left-0 right-0 bg-gradient-to-r from-blue-500 to-purple-600 text-white p-3 rounded-b-lg font-semibold text-lg"
            >
              Ant's Point of View
            </div>
          </div>
          <div class="slide hidden">
            <img
              src="assets/Contrast.JPG"
              alt="Contrast"
              class="w-full rounded-lg shadow-md"
            />
            <div
              class="caption absolute bottom-0 left-0 right-0 bg-gradient-to-r from-blue-500 to-purple-600 text-white p-3 rounded-b-lg font-semibold text-lg"
            >
              Contrast
            </div>
          </div>
          <div class="slide hidden">
            <img
              src="assets/Spirit.JPG"
              alt="School Spirit"
              class="w-full rounded-lg shadow-md"
            />
            <div
              class="caption absolute bottom-0 left-0 right-0 bg-gradient-to-r from-blue-500 to-purple-600 text-white p-3 rounded-b-lg font-semibold text-lg"
            >
              School Spirit
            </div>
          </div>
          <div class="slide hidden">
            <img
              src="assets/Texture.JPG"
              alt="Texture"
              class="w-full rounded-lg shadow-md"
            />
            <div
              class="caption absolute bottom-0 left-0 right-0 bg-gradient-to-r from-blue-500 to-purple-600 text-white p-3 rounded-b-lg font-semibold text-lg"
            >
              Texture 
            </div>
          </div>
          <div class="slide hidden">
            <img
              src="assets/Represent.JPG"
              alt="Represent"
              class="w-full rounded-lg shadow-md"
            />
            <div
              class="caption absolute bottom-0 left-0 right-0 bg-gradient-to-r from-blue-500 to-purple-600 text-white p-3 rounded-b-lg font-semibold text-lg"
            >
              Representation
            </div>
          </div>
          <div class="slide hidden">
            <img
              src="assets/Ruleofthirds.JPG"
              alt="Rule of Thirds"
              class="w-full rounded-lg shadow-md"
            />
            <div
              class="caption absolute bottom-0 left-0 right-0 bg-gradient-to-r from-blue-500 to-purple-600 text-white p-3 rounded-b-lg font-semibold text-lg"
            >
              Rule of Thirds
            </div>
          </div>
          <div class="slide hidden">
            <img
              src="assets/Symbol.JPG"
              alt="Symbol"
              class="w-full rounded-lg shadow-md"
            />
            <div
              class="caption absolute bottom-0 left-0 right-0 bg-gradient-to-r from-blue-500 to-purple-600 text-white p-3 rounded-b-lg font-semibold text-lg"
            >
              Symbol
            </div>
          </div>
          <div class="slide hidden">
            <img
              src="assets/Line.JPG"
              alt="Line"
              class="w-full rounded-lg shadow-md"
            />
            <div
              class="caption absolute bottom-0 left-0 right-0 bg-gradient-to-r from-blue-500 to-purple-600 text-white p-3 rounded-b-lg font-semibold text-lg"
            >
              Line
            </div>
          </div>

          <button
            class="prev absolute left-2 top-1/2 transform -translate-y-1/2 bg-black bg-opacity-50 text-white p-3 rounded-full hover:bg-opacity-75 text-xl font-bold"
            onclick="plusSlides(-1)"
          >
            &#10094;
          </button>
          <button
            class="next absolute right-2 top-1/2 transform -translate-y-1/2 bg-black bg-opacity-50 text-white p-3 rounded-full hover:bg-opacity-75 text-xl font-bold"
            onclick="plusSlides(1)"
          >
            &#10095;
          </button>
          <div
            id="image-counter"
            class="absolute bottom-2 right-2 bg-black bg-opacity-75 text-white px-3 py-1 rounded font-semibold text-sm"
          >
            1/10
          </div>
        </div>

        <div class="dots flex justify-center space-x-2 mt-6">
          <span
            class="dot w-3 h-3 bg-gray-300 rounded-full cursor-pointer"
            onclick="currentSlide(1)"
          ></span>
          <span
            class="dot w-3 h-3 bg-gray-300 rounded-full cursor-pointer"
            onclick="currentSlide(2)"
          ></span>
          <span
            class="dot w-3 h-3 bg-gray-300 rounded-full cursor-pointer"
            onclick="currentSlide(3)"
          ></span>
          <span
            class="dot w-3 h-3 bg-gray-300 rounded-full cursor-pointer"
            onclick="currentSlide(4)"
          ></span>
          <span
            class="dot w-3 h-3 bg-gray-300 rounded-full cursor-pointer"
            onclick="currentSlide(5)"
          ></span>
          <span
            class="dot w-3 h-3 bg-gray-300 rounded-full cursor-pointer"
            onclick="currentSlide(6)"
          ></span>
          <span
            class="dot w-3 h-3 bg-gray-300 rounded-full cursor-pointer"
            onclick="currentSlide(7)"
          ></span>
          <span
            class="dot w-3 h-3 bg-gray-300 rounded-full cursor-pointer"
            onclick="currentSlide(8)"
          ></span>
          <span
            class="dot w-3 h-3 bg-gray-300 rounded-full cursor-pointer"
            onclick="currentSlide(9)"
          ></span>
          <span
            class="dot w-3 h-3 bg-gray-300 rounded-full cursor-pointer"
            onclick="currentSlide(10)"
          ></span>
        </div>

        <!-- Lightbox overlay for clickable image enlarge -->
        <div id="lightbox" class="fixed inset-0 bg-black bg-opacity-70 hidden items-center justify-center z-50" onclick="closeLightbox()">
          <div class="relative max-w-4xl w-full p-2" onclick="event.stopPropagation()">
            <button
              class="absolute top-2 right-2 text-white bg-black bg-opacity-50 hover:bg-opacity-75 px-3 py-1 rounded text-xl"
              onclick="closeLightbox()"
            >&times;</button>
            <img id="lightbox-img" class="w-full h-auto rounded-lg shadow-2xl" src="" alt="" />
            <p id="lightbox-caption" class="mt-2 text-white text-center text-base"></p>
          </div>
        </div>
      </main>
    </div>

    <script>
      let slideIndex = 1;
      showSlides(slideIndex);

      function plusSlides(n) {
        showSlides((slideIndex += n));
      }

      function currentSlide(n) {
        showSlides((slideIndex = n));
      }

      function showSlides(n) {
        let i;
        let slides = document.getElementsByClassName("slide");
        let dots = document.getElementsByClassName("dot");
        if (n > slides.length) {
          slideIndex = 1;
        }
        if (n < 1) {
          slideIndex = slides.length;
        }
        for (i = 0; i < slides.length; i++) {
          slides[i].style.display = "none";
        }
        for (i = 0; i < dots.length; i++) {
          dots[i].className = dots[i].className.replace(" active", "");
          dots[i].classList.remove("bg-black");
          dots[i].classList.add("bg-gray-300");
        }
        slides[slideIndex - 1].style.display = "block";
        dots[slideIndex - 1].className += " active";
        dots[slideIndex - 1].classList.remove("bg-gray-300");
        dots[slideIndex - 1].classList.add("bg-black");
        document.getElementById("image-counter").textContent =
          slideIndex + "/" + slides.length;
      }

      function openLightbox(img) {
        let lightbox = document.getElementById("lightbox");
        let lightboxImg = document.getElementById("lightbox-img");
        let lightboxCaption = document.getElementById("lightbox-caption");
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt;
        lightboxCaption.textContent = img.alt || "";
        lightbox.classList.remove("hidden");
        lightbox.classList.add("flex");
      }

      function closeLightbox() {
        let lightbox = document.getElementById("lightbox");
        lightbox.classList.add("hidden");
        lightbox.classList.remove("flex");
      }

      document.addEventListener("DOMContentLoaded", function () {
        const slideImages = document.querySelectorAll(".slide img");
        slideImages.forEach((image) => {
          image.style.cursor = "pointer";
          image.addEventListener("click", () => openLightbox(image));
        });
      });
    </script>

    <footer class="mt-8 text-center text-gray-600">
      <p>&copy; 2026 Dayton Vinson. All rights reserved.</p>
    </footer>
  </body>
</html>
