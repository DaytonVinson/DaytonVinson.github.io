<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Gallery - Dayton Vinson</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }

      /* Gallery grid styles */
      .gallery-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 1.5rem;
        max-width: 1200px;
        margin: 0 auto;
      }

      .gallery-item {
        position: relative;
        overflow: hidden;
        border-radius: 0.5rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }

      .gallery-item:hover {
        transform: translateY(-4px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }

      .gallery-item img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        transition: transform 0.3s ease;
      }

      .gallery-item:hover img {
        transform: scale(1.05);
      }

      .caption {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(to right, #3b82f6, #8b5cf6);
        color: white;
        padding: 0.75rem;
        font-weight: 600;
        font-size: 1rem;
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .gallery-item:hover .caption {
        opacity: 1;
      }

      /* Lightbox styles */
      #lightbox {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.8);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      #lightbox.flex {
        display: flex;
      }

      #lightbox img {
        max-width: 90%;
        max-height: 90%;
        object-fit: contain;
      }

      #lightbox button {
        position: absolute;
        top: 20px;
        right: 20px;
        background: none;
        border: none;
        color: white;
        font-size: 2rem;
        cursor: pointer;
        z-index: 1001;
      }

      #lightbox-caption {
        color: white;
        text-align: center;
        margin-top: 10px;
        font-size: 1.125rem;
      }

      /* Responsive design */
      @media (max-width: 768px) {
        .gallery-container {
          grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
          gap: 1rem;
        }

        .gallery-item img {
          height: 200px;
        }
      }
    </style>
  </head>
  <body>

          <ul>

            />
            <div

        </div>

        <!-- Lightbox overlay for clickable image enlarge -->
        <div
          id="lightbox"
          class="fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-50 hidden"
        >
          <div class="relative max-w-4xl max-h-full p-4">
            <button
              onclick="closeLightbox()"
              class="absolute top-2 right-2 text-white text-2xl font-bold hover:text-gray-300"
            >
              &times;
            </button>
            <img
              id="lightbox-img"
              src=""
              alt=""
              class="max-w-full max-h-full object-contain"
            />
            <p
              id="lightbox-caption"
              class="text-white text-center mt-2 text-lg"
            ></p>
          </div>
        </div>
      </main>
    </div>

    <script>
      function openLightbox(img) {
        let lightbox = document.getElementById("lightbox");
        let lightboxImg = document.getElementById("lightbox-img");
        let lightboxCaption = document.getElementById("lightbox-caption");
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt;
        lightboxCaption.textContent = img.alt || "";
        lightbox.classList.remove("hidden");
        lightbox.classList.add("flex");
      }

      function closeLightbox() {
        let lightbox = document.getElementById("lightbox");
        lightbox.classList.add("hidden");
        lightbox.classList.remove("flex");
      }

      document.addEventListener("DOMContentLoaded", function () {
        const galleryImages = document.querySelectorAll(".gallery-item img");
        galleryImages.forEach((image) => {
          image.addEventListener("click", () => openLightbox(image));
        });
      });
    </script>
